name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - uses: actions/setup-node@v4
        with: {node-version: "22", cache: npm, cache-dependency-path: addon/package-lock.json}
      - run: python -m pip install -e ".[dev,release]"
      - run: pytest -p no:cacheprovider -q
      - run: ruff check --no-cache src tests examples
      - run: mypy --no-incremental src
      - run: npm ci && cp .env.example .env && npm test && npm run lint && npm run typecheck && npm run build:production
        working-directory: addon
      - name: Verify tag matches package version
        env: {TAG: "${{ github.ref_name }}"}
        run: python tools/check_release_tag.py "$TAG"
      - run: python -m build --sdist --wheel
      - run: twine check dist/* && python tools/check_dist.py dist
      - run: python -m pip wheel --no-deps dist/*.tar.gz -w /tmp/rebuilt
      - uses: actions/upload-artifact@v4
        with: {name: python-dist, path: dist/*, if-no-files-found: error}
  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: {name: python-dist, path: dist}
      - uses: pypa/gh-action-pypi-publish@release/v1
