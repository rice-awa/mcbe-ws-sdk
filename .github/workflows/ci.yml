name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: python -m pip install -e ".[dev]"
      - run: ruff check --no-cache src tests examples
      - run: mypy --no-incremental src
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: {python: ["3.11", "3.12", "3.13", "3.14"]}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ matrix.python }}", cache: pip}
      - run: python -m pip install -e ".[dev]"
      - run: pytest -p no:cacheprovider --cov=mcbe_ws_sdk --cov-report=term-missing -q
  websockets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: {websockets: ["~=12.0", "~=14.0", "~=16.0"]}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: python -m pip install -e ".[dev]" "websockets${{ matrix.websockets }}"
      - run: pytest -p no:cacheprovider tests/unit/test_server_facade.py tests/unit/test_delivery.py -q
  addon:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: addon}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "22", cache: npm, cache-dependency-path: addon/package-lock.json}
      - run: npm ci
      - run: cp .env.example .env
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build:production
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: python -m pip install -e ".[docs]"
      - run: mkdocs build --strict
      - uses: actions/upload-artifact@v4
        with: {name: docs-site, path: site/, if-no-files-found: error}
  dist:
    needs: [quality, python, websockets, addon, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: python -m pip install -e ".[dev,release]"
      - run: python -m build --sdist --wheel
      - run: twine check dist/*
      - run: python tools/check_dist.py dist
      - run: python -m pip wheel --no-deps dist/*.tar.gz -w /tmp/rebuilt
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: python -c "import mcbe_ws_sdk; print(mcbe_ws_sdk.__version__)"
      - uses: actions/upload-artifact@v4
        with: {name: python-dist, path: dist/*, if-no-files-found: error}
